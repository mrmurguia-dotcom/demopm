<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escáner de Texto Plano JDE</title>
</head>
<body style="background: #1a1a1a; color: #00ff00; font-family: monospace; padding: 20px;">
    <h2>🔍 Analizador de Texto Crudo</h2>
    <p>Subí el archivo .xls tal cual baja de JDE (sin abrirlo ni guardarlo):</p>
    <input type="file" id="file">
    <hr>
    <div id="debug" style="white-space: pre; border: 1px solid #333; padding: 10px; margin-top: 20px;"></div>

    <script>
        document.getElementById('file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(ev) {
                const content = ev.target.result;
                let log = "=== INICIO DEL ARCHIVO (Primeros 2000 caracteres) ===\n\n";
                log += content.substring(0, 2000).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                // Intentamos buscar si hay etiquetas <td>
                const tdCount = (content.match(/<td/gi) || []).length;
                log += "\n\n=== ESTADÍSTICAS ===\n";
                log += `Total de celdas (td) encontradas: ${tdCount}\n`;
                
                if (tdCount > 0) {
                    log += "\n=== MUESTRA DE DATOS ENCONTRADOS ===\n";
                    const regex = /<td[^>]*>(.*?)<\/td>/gi;
                    let match;
                    let count = 0;
                    while ((match = regex.exec(content)) && count < 50) {
                        let text = match[1].replace(/<[^>]*>/g, "").trim();
                        if(text) {
                            log += `Dato [${count}]: ${text}\n`;
                            count++;
                        }
                    }
                }
                
                document.getElementById('debug').innerHTML = log;
            };
            
            reader.readAsText(file, "iso-8859-1"); // JDE suele usar esta codificación
        });
    </script>
</body>
</html>
