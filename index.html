<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimizador de Picking - Pallets Mixtos</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0056b3; --secondary: #e9ecef; --text-dark: #333; --success: #28a745; --warning: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        .upload-section { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .upload-box { flex: 1; min-width: 300px; border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; background-color: var(--secondary); }
        .status-msg { font-size: 0.85em; display: block; margin-top: 10px; color: #666; }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .pm-nav { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .pm-tab { background-color: var(--secondary); padding: 10px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .pm-tab.active { background-color: var(--primary); color: white; }
        .pallet-card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; display: none; }
        .pallet-card.active { display: block; }
        .pallet-header { background-color: #f8f9fa; padding: 15px; border-left: 5px solid var(--primary); margin-bottom: 15px; }
        .highlight { background-color: var(--warning); padding: 2px 6px; border-radius: 3px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 0.9em; }
        th { background-color: var(--primary); color: white; }
        .print-btn { background-color: var(--success); width: 100%; padding: 15px; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; margin-top: 20px; font-weight: bold; }
        @media print { .upload-section, .pm-nav, .print-btn { display: none; } .pallet-card { display: block !important; page-break-after: always; border: none; margin-bottom: 50px; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Asistente de Armado JDE 9.2</h1>

    <div class="upload-section">
        <div class="upload-box">
            <h3>1. Maestro de Artículos</h3>
            <input type="file" id="masterFile" accept=".xlsx, .xls">
            <span id="masterStatus" class="status-msg">Carga el maestro primero.</span>
        </div>
        <div class="upload-box">
            <h3>2. Surtido (Excel JDE)</h3>
            <input type="file" id="surtidoFile" accept=".xlsx, .xls">
            <button onclick="procesarExcelSurtido()">Generar Pallets Mixtos</button>
        </div>
    </div>

    <div id="resultadosArea" style="display: none;">
        <hr>
        <div id="tabsContainer" class="pm-nav"></div>
        <div id="palletsContainer"></div>
        <button class="print-btn" onclick="window.print()">🖨️ Imprimir Todas las Hojas de Ruta</button>
    </div>
</div>

<script>
    let maestro = JSON.parse(localStorage.getItem('maestroConfig')) || {};

    // Función para quitar tildes y normalizar texto
    const normalizar = (texto) => {
        if (!texto) return "";
        return texto.toString().trim()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toUpperCase();
    };

    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
            const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            maestro = {};
            data.forEach(item => { if(item.SKU) maestro[item.SKU] = item; });
            localStorage.setItem('maestroConfig', JSON.stringify(maestro));
            document.getElementById('masterStatus').innerText = `✅ Maestro OK: ${Object.keys(maestro).length} SKUs.`;
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function procesarExcelSurtido() {
        const file = document.getElementById('surtidoFile').files[0];
        if (!file) return alert("Sube el archivo de surtido.");
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawData = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""}); 

            let headerRowIndex = -1;
            let nCarga = "S/D", nDeposito = "S/D";

            for(let i=0; i < rawData.length; i++){
                const row = rawData[i];
                if(!Array.isArray(row)) continue;

                // 1. Buscamos Carga y Depósito en cualquier parte de la fila
                row.forEach((cell, idx) => {
                    let cellTxt = normalizar(cell);
                    if(cellTxt.includes("CARGA:")) nCarga = row[idx + 1] || "S/D";
                    if(cellTxt.includes("DEPOSITO:")) nDeposito = row[idx + 1] || "S/D";
                });

                // 2. Buscamos "UBICACION" específicamente en la COLUMNA A (indice 0)
                if(normalizar(row[0]) === "UBICACION") {
                    headerRowIndex = i;
                }
            }

            if(headerRowIndex === -1) {
                alert("No encontré la palabra 'Ubicación' en la Columna A. Revisa el archivo.");
                return;
            }

            // Los datos empiezan 2 filas después del encabezado (saltando la fila en blanco)
            const dataRows = rawData.slice(headerRowIndex + 2);
            const itemsProcesados = [];

            dataRows.forEach(row => {
                // Si la primera celda está vacía, terminó la tabla de datos
                if(!row[0] || row[0] === "") return;

                let desc = normalizar(row[3]);
                if(desc.includes("PALLET HOMOGENEO")) return;

                itemsProcesados.push({
                    ubicacion: row[0],
                    linea: row[1],
                    sku: row[2],
                    descripcion: row[3],
                    cantidad: parseInt(row[4].toString().replace(/\D/g, "")) || 0,
                    orden: row[7] || "S/D",
                    carga: nCarga,
                    dep: nDeposito
                });
            });

            if(itemsProcesados.length === 0) return alert("No hay datos de picking para procesar.");
            armarPallets(itemsProcesados);
        };
        reader.readAsArrayBuffer(file);
    }

    function armarPallets(items) {
        const pallets = [];
        let currentPM = null;

        items.forEach(item => {
            const info = maestro[item.sku] || { "Base": 28, "Camada": 5, "Familia": "Gral" };
            const ubic = item.ubicacion.toString().toUpperCase();
            let depFisico = ubic.startsWith("P00A") ? "Dep. 1" : 
                             ubic.startsWith("P002") ? "Dep. 2" : "Dep. 3";

            const capMax = (parseInt(info.Base) || 28) * (parseInt(info.Camada) || 5);
            
            const necesitaNuevo = !currentPM || 
                                currentPM.depFisico !== depFisico || 
                                currentPM.familia !== info.Familia ||
                                (currentPM.total + item.cantidad) > (capMax + 2);

            if (necesitaNuevo) {
                if (currentPM) pallets.push(currentPM);
                currentPM = {
                    id: pallets.length + 1,
                    depFisico, familia: info.Familia, base: info.Base, cam: info.Camada,
                    orden: item.orden, nCarga: `${item.dep}-${item.carga}`,
                    items: [], total: 0
                };
            }
            currentPM.items.push(item);
            currentPM.total += item.cantidad;
        });
        if (currentPM) pallets.push(currentPM);
        render(pallets);
    }

    function render(pallets) {
        const tCon = document.getElementById('tabsContainer');
        const pCon = document.getElementById('palletsContainer');
        tCon.innerHTML = ""; pCon.innerHTML = "";

        pallets.forEach((p, idx) => {
            const tab = document.createElement('div');
            tab.className = `pm-tab ${idx===0?'active':''}`;
            tab.innerText = `PM ${p.id} (${p.depFisico})`;
            tab.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(el => el.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`p-${p.id}`).classList.add('active');
            };
            tCon.appendChild(tab);

            const card = document.createElement('div');
            card.id = `p-${p.id}`;
            card.className = `pallet-card ${idx===0?'active':''}`;
            card.innerHTML = `
                <div class="pallet-header">
                    <h3>PM #${p.id} | Orden: ${p.orden} | ${p.depFisico}</h3>
                    <p>N° de Carga: <span class="highlight">${p.nCarga}</span></p>
                    <p><strong>Config:</strong> Base ${p.base} | Camadas ${p.cam} | Familia ${p.familia}</p>
                </div>
                <table>
                    <thead><tr><th>Línea</th><th>Ubicación</th><th>SKU</th><th>Descripción</th><th>Cant</th></tr></thead>
                    <tbody>${p.items.map(i => `<tr><td>${i.linea}</td><td>${i.ubicacion}</td><td>${i.sku}</td><td>${i.descripcion}</td><td>${i.cantidad}</td></tr>`).join('')}</tbody>
                </table>
                <p style="text-align:right"><strong>Total Pallet: ${p.total} bultos</strong></p>
            `;
            pCon.appendChild(card);
        });
        document.getElementById('resultadosArea').style.display = 'block';
    }
</script>
</body>
</html>
