<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Optimizador de Picking - JDE BIP</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<style>

:root{
--primary:#0056b3;
--secondary:#e9ecef;
--success:#28a745;
}

body{
font-family:'Segoe UI',sans-serif;
background:#f4f7f6;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

.upload-section{
display:flex;
gap:20px;
margin-bottom:20px;
}

.upload-box{
flex:1;
border:2px dashed #ccc;
padding:20px;
text-align:center;
border-radius:8px;
background:var(--secondary);
}

button{
background:var(--primary);
color:white;
border:none;
padding:12px 25px;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.pm-nav{
display:flex;
gap:10px;
margin:20px 0;
overflow-x:auto;
}

.pm-tab{
background:var(--secondary);
padding:10px 18px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.pm-tab.active{
background:var(--primary);
color:white;
}

.pallet-card{
border:1px solid #ddd;
border-radius:8px;
padding:20px;
display:none;
}

.pallet-card.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
font-size:0.85em;
}

th{
background:var(--primary);
color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>📦 Picking JDE (BI Publisher)</h1>

<div class="upload-section">

<div class="upload-box">
<h3>Maestro</h3>
<input type="file" id="masterFile">
</div>

<div class="upload-box">
<h3>Surtido BIP</h3>
<input type="file" id="surtidoFile">
<br><br>
<button onclick="procesarBIP()">Procesar archivo</button>
</div>

</div>

<div id="resultadosArea" style="display:none;">
<div id="tabsContainer" class="pm-nav"></div>
<div id="palletsContainer"></div>
</div>

</div>

<script>

let maestro = JSON.parse(localStorage.getItem('maestroConfig')) || {};

document.getElementById('masterFile').addEventListener('change', function(e){

const reader = new FileReader();

reader.onload = ev => {

const wb = XLSX.read(new Uint8Array(ev.target.result),{type:'array'});

const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

maestro={};

data.forEach(item=>{

if(item.SKU){
maestro[item.SKU.toString().trim()] = item;
}

});

localStorage.setItem('maestroConfig',JSON.stringify(maestro));

alert("Maestro cargado");

};

reader.readAsArrayBuffer(e.target.files[0]);

});

function procesarBIP(){

const file=document.getElementById('surtidoFile').files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

const data=new Uint8Array(e.target.result);

const workbook=XLSX.read(data,{
type:'array',
raw:false,
dense:true,
cellText:true
});

const sheet=workbook.Sheets[workbook.SheetNames[0]];

const rows=XLSX.utils.sheet_to_json(sheet,{
header:1,
blankrows:false,
defval:""
});

let headerIndex=-1;

rows.forEach((row,i)=>{

const txt=row.join(" ").toUpperCase();

if(
txt.includes("SKU") ||
txt.includes("ARTIC") ||
txt.includes("ITEM")
){
headerIndex=i;
}

});

if(headerIndex==-1){
alert("No se pudo detectar encabezado.");
return;
}

const headers=rows[headerIndex].map(h=>h.toString().toUpperCase());

const col={

ubic: headers.findIndex(h=>h.includes("UBIC")),
sku: headers.findIndex(h=>h.includes("SKU") || h.includes("ART")),
desc: headers.findIndex(h=>h.includes("DESC")),
cant: headers.findIndex(h=>h.includes("CANT")),
orden: headers.findIndex(h=>h.includes("ORD"))

};

let items=[];
let nCarga="S/D";

rows.forEach(r=>{

const line=r.join(" ").toUpperCase();

if(line.includes("CARGA")){
nCarga=r[r.length-1] || nCarga;
}

});

rows.slice(headerIndex+1).forEach(row=>{

let sku=(row[col.sku] || "").toString().trim();
let ubic=(row[col.ubic] || "").toString().trim();
let desc=(row[col.desc] || "").toString().trim();

let cant=row[col.cant];

if(typeof cant==="string"){
cant=cant.replace(",",".");
}

cant=parseFloat(cant) || 0;

if(!sku || cant<=0) return;

items.push({
ubicacion:ubic,
sku:sku,
descripcion:desc,
cantidad:cant,
orden:row[col.orden] || "S/D",
nCarga:nCarga
});

});

if(items.length===0){
alert("No se encontraron líneas válidas.");
return;
}

armarPallets(items);

};

reader.readAsArrayBuffer(file);

}

function armarPallets(items){

const pallets=[];
let current=null;

items.forEach(item=>{

const info=maestro[item.sku] || {Base:28,Camada:5,Familia:"General"};

const ubi=item.ubicacion.toUpperCase();

let dep="Dep.3";

if(ubi.startsWith("P00A")) dep="Dep.1";
else if(ubi.startsWith("P002")) dep="Dep.2";

const cap=(parseInt(info.Base)||28)*(parseInt(info.Camada)||5);

if(
!current ||
current.dep!==dep ||
current.familia!==info.Familia ||
(current.total+item.cantidad)>(cap+2)
){

if(current) pallets.push(current);

current={
id:pallets.length+1,
dep:dep,
familia:info.Familia,
base:info.Base,
cam:info.Camada,
nCarga:item.nCarga,
items:[],
total:0
};

}

current.items.push(item);

current.total+=item.cantidad;

});

if(current) pallets.push(current);

render(pallets);

}

function render(pallets){

document.getElementById('resultadosArea').style.display='block';

const tCon=document.getElementById('tabsContainer');
const pCon=document.getElementById('palletsContainer');

tCon.innerHTML="";
pCon.innerHTML="";

pallets.forEach((p,idx)=>{

const tab=document.createElement('div');

tab.className=`pm-tab ${idx===0?'active':''}`;
tab.innerText=`PM ${p.id}`;

tab.onclick=()=>{

document.querySelectorAll('.pm-tab,.pallet-card')
.forEach(e=>e.classList.remove('active'));

tab.classList.add('active');

document.getElementById(`p-${p.id}`).classList.add('active');

};

tCon.appendChild(tab);

const card=document.createElement('div');

card.id=`p-${p.id}`;
card.className=`pallet-card ${idx===0?'active':''}`;

card.innerHTML=`

<h3>Pallet #${p.id} - ${p.dep}</h3>

<p>Carga: ${p.nCarga} | Familia: ${p.familia}</p>

<table>

<thead>
<tr>
<th>Ubicación</th>
<th>SKU</th>
<th>Descripción</th>
<th>Cantidad</th>
</tr>
</thead>

<tbody>

${p.items.map(i=>`
<tr>
<td>${i.ubicacion}</td>
<td>${i.sku}</td>
<td>${i.descripcion}</td>
<td>${i.cantidad}</td>
</tr>
`).join('')}

</tbody>

</table>

<h4 style="text-align:right">Total: ${p.total}</h4>

`;

pCon.appendChild(card);

});

}

</script>

</body>
</html>
