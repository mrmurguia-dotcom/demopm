<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Optimizador de Picking - JDE</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0056b3; --secondary: #e9ecef; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        .upload-section { display: flex; gap: 20px; margin-bottom: 20px; }
        .upload-box { flex: 1; border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; background-color: var(--secondary); }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .pm-nav { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .pm-tab { background-color: var(--secondary); padding: 10px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .pm-tab.active { background-color: var(--primary); color: white; }
        .pallet-card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; display: none; }
        .pallet-card.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 0.85em; }
        th { background-color: var(--primary); color: white; }
        .total-row { text-align: right; font-weight: bold; margin-top: 10px; color: var(--primary); }
        @media print { .upload-section, .pm-nav { display: none; } .pallet-card { display: block !important; page-break-after: always; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Optimizador JDE - BIP Edition</h1>
    
    <div class="upload-section">
        <div class="upload-box">
            <h3>1. Maestro de Artículos</h3>
            <input type="file" id="masterFile">
        </div>
        <div class="upload-box">
            <h3>2. Surtido BIP (.xls)</h3>
            <input type="file" id="surtidoFile">
            <button onclick="procesarBIP()">Generar Pallets</button>
        </div>
    </div>

    <div id="resultadosArea" style="display: none;">
        <div id="tabsContainer" class="pm-nav"></div>
        <div id="palletsContainer"></div>
    </div>
</div>

<script>
    let maestro = JSON.parse(localStorage.getItem('maestroConfig')) || {};
    let tablaAuxiliarPicking = [];

    // Carga del Maestro
    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            maestro = {};
            data.forEach(item => { 
                let key = item.SKU || item.Artículo || item.Articulo;
                if(key) maestro[key.toString().trim()] = item; 
            });
            localStorage.setItem('maestroConfig', JSON.stringify(maestro));
            alert("Maestro cargado: " + Object.keys(maestro).length + " artículos.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function procesarBIP() {
        const file = document.getElementById('surtidoFile').files[0];
        if (!file) return alert("Selecciona el archivo de surtido.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawRows = XLSX.utils.sheet_to_json(firstSheet, {header: 1, defval: ""});

            sanitizarDatos(rawRows);

            if (tablaAuxiliarPicking.length > 0) {
                armarPallets();
            } else {
                alert("No se detectaron líneas válidas. Revisá que la columna se llame 'Artículo'.");
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function sanitizarDatos(filas) {
        tablaAuxiliarPicking = [];
        let cargaActual = "S/D";
        let depActual = "S/D";

        filas.forEach((row) => {
            let rowStr = row.join("|").toUpperCase();
            
            // Extraer Carga y Depósito del encabezado del BIP
            if(rowStr.includes("CARGA:")) {
                let idx = row.findIndex(c => c.toString().toUpperCase().includes("CARGA:"));
                cargaActual = row[idx + 1] || cargaActual;
            }
            if(rowStr.includes("DEPOSITO:")) {
                let idx = row.findIndex(c => c.toString().toUpperCase().includes("DEPOSITO:"));
                depActual = row[idx + 1] || depActual;
            }

            // Detectar filas de productos
            // Según tu imagen: Col 0: Ubicación, Col 1: Artículo (SKU), Col 4: Descripción, Col 9: Cantidad
            let ubic = row[0] ? row[0].toString().trim() : "";
            let sku  = row[1] ? row[1].toString().trim() : "";
            let desc = row[4] ? row[4].toString().trim() : "";
            let cantRaw = row[9] ? row[9].toString() : "0";
            let cant = parseInt(cantRaw.replace(/[^\d]/g, "")); // Limpia el "CA" y deja solo el número

            // FILTRO: Si tiene SKU numérico y cantidad > 0, es una línea de picking
            if (sku !== "" && !isNaN(sku) && sku.toUpperCase() !== "ARTÍCULO" && cant > 0) {
                tablaAuxiliarPicking.push({
                    ubicacion: ubic,
                    sku: sku,
                    descripcion: desc,
                    cantidad: cant,
                    nCarga: cargaActual,
                    deposito: depActual,
                    orden: row[7] || "S/D"
                });
            }
        });
    }

    function armarPallets() {
        const pallets = [];
        let current = null;

        tablaAuxiliarPicking.forEach(item => {
            const info = maestro[item.sku] || { "Base": 28, "Camada": 5, "Familia": "General" };
            const ubi = item.ubicacion.toUpperCase();
            
            // Lógica de Depósito basada en prefijo de ubicación
            let depLabel = ubi.startsWith("P00A") ? "Dep. 1" : ubi.startsWith("P014") ? "Dep. 3" : "Otros";
            const capacidad = (parseInt(info.Base) || 28) * (parseInt(info.Camada) || 5);

            if (!current || current.dep !== depLabel || current.familia !== info.Familia || (current.total + item.cantidad) > (capacidad + 5)) {
                if (current) pallets.push(current);
                current = { 
                    id: pallets.length + 1, 
                    dep: depLabel, 
                    familia: info.Familia, 
                    nCarga: item.nCarga,
                    orden: item.orden,
                    items: [], 
                    total: 0 
                };
            }
            current.items.push(item);
            current.total += item.cantidad;
        });
        if (current) pallets.push(current);
        render(pallets);
    }

    function render(pallets) {
        const tCon = document.getElementById('tabsContainer');
        const pCon = document.getElementById('palletsContainer');
        tCon.innerHTML = ""; pCon.innerHTML = "";
        
        pallets.forEach((p, idx) => {
            const tab = document.createElement('div');
            tab.className = `pm-tab ${idx===0?'active':''}`;
            tab.innerText = `PM ${p.id} (${p.dep})`;
            tab.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(e => e.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`p-${p.id}`).classList.add('active');
            };
            tCon.appendChild(tab);

            const card = document.createElement('div');
            card.id = `p-${p.id}`;
            card.className = `pallet-card ${idx===0?'active':''}`;
            card.innerHTML = `
                <div style="border-bottom: 2px solid var(--primary); margin-bottom:10px;">
                    <h2 style="margin:0">Pallet Mixto #${p.id} - ${p.dep}</h2>
                    <p><b>Carga:</b> ${p.nCarga} | <b>Orden:</b> ${p.orden} | <b>Familia:</b> ${p.familia}</p>
                </div>
                <table>
                    <thead><tr><th>Ubicación</th><th>Artículo</th><th>Descripción</th><th>Cant</th></tr></thead>
                    <tbody>${p.items.map(i => `<tr><td>${i.ubicacion}</td><td>${i.sku}</td><td>${i.descripcion}</td><td>${i.cantidad} CA</td></tr>`).join('')}</tbody>
                </table>
                <div class="total-row">TOTAL BULTOS: ${p.total}</div>
            `;
            pCon.appendChild(card);
        });
        document.getElementById('resultadosArea').style.display = 'block';
    }
</script>
</body>
</html>
