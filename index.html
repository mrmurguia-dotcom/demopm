<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Optimizador de Picking - Método Seguro</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0056b3; --secondary: #f8f9fa; --success: #28a745; --accent: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        .step-box { border: 1px solid #dee2e6; padding: 20px; border-radius: 8px; background: var(--secondary); margin-bottom: 20px; }
        .step-title { font-weight: bold; color: var(--primary); margin-bottom: 10px; display: block; font-size: 1.1em; }
        .buttons-group { display: flex; gap: 10px; align-items: center; margin-top: 15px; }
        button { border: none; padding: 12px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-convert { background-color: var(--accent); color: white; }
        .btn-generate { background-color: var(--success); color: white; }
        .pm-nav { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .pm-tab { background-color: #ddd; padding: 10px 15px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
        .pm-tab.active { background-color: var(--primary); color: white; }
        .pallet-card { display: none; border: 2px solid #ddd; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .pallet-card.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; font-size: 0.9em; }
        th { background: #f2f2f2; }
        .badge { background: #ffc107; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; font-weight: bold; }
        @media print { .step-box, .pm-nav, h1, .buttons-group { display: none; } .pallet-card { display: block !important; page-break-after: always; border: none; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Asistente de Armado v8.0</h1>

    <div class="step-box">
        <span class="step-title">⚙️ 0. Cargar Maestro:</span>
        <input type="file" id="masterFile" accept=".xlsx, .xls">
    </div>

    <div class="step-box">
        <span class="step-title">🚚 1 y 2. Procesar Surtido:</span>
        <p style="font-size: 0.9em; color: #666;">Selecciona el archivo de JDE:</p>
        <input type="file" id="surtidoFile" accept=".xlsx, .xls">
        
        <div class="buttons-group">
            <button class="btn-convert" onclick="convertirArchivo()">1- GUARDAR ARCHIVO LIMPIO</button>
            <button class="btn-generate" onclick="generarPallets()">2- GENERAR PALLETS</button>
        </div>
    </div>

    <div id="resultadosArea" style="display: none;">
        <hr>
        <div id="tabsContainer" class="pm-nav"></div>
        <div id="palletsContainer"></div>
        <button onclick="window.print()" style="width:100%; margin-top:20px; background:#444; color:white; padding:15px; border-radius: 8px; font-weight: bold; cursor: pointer;">🖨️ IMPRIMIR TODOS LOS PALLETS</button>
    </div>
</div>

<script>
    let maestro = JSON.parse(localStorage.getItem('maestroConfig')) || {};

    // Cargar Maestro
    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            maestro = {};
            data.forEach(item => {
                let sku = item.SKU || item.Artículo || item.Articulo;
                if(sku) maestro[sku.toString().trim()] = item;
            });
            localStorage.setItem('maestroConfig', JSON.stringify(maestro));
            alert("Maestro sincronizado.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    // PASO 1: Descargar archivo con el nombre original + _LIMPIO
    function convertirArchivo() {
        const fileInput = document.getElementById('surtidoFile');
        if (!fileInput.files[0]) return alert("Selecciona el archivo de JDE primero.");

        const reader = new FileReader();
        const originalName = fileInput.files[0].name.split('.')[0];

        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            XLSX.writeFile(workbook, `${originalName}_LIMPIO.xlsx`);
            alert(`✅ Archivo guardado como: ${originalName}_LIMPIO.xlsx\n\nAhora selecciónalo y dale a GENERAR PALLETS.`);
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    // PASO 2: Generar Pallets (Escaneo dinámico de columnas)
    function generarPallets() {
        const file = document.getElementById('surtidoFile').files[0];
        if (!file) return alert("Selecciona el archivo nuevo (_LIMPIO).");

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, {header: 1});

            let itemsFinal = [];
            let colIdx = { ubi: -1, art: -1, desc: -1, cant: -1 };

            // BUSCADOR DINÁMICO DE COLUMNAS
            for(let i=0; i<rows.length; i++){
                let row = rows[i].map(c => c.toString().toUpperCase());
                if(row.includes("UBICACIÓN") || row.includes("ARTÍCULO")){
                    colIdx.ubi = row.indexOf("UBICACIÓN");
                    colIdx.art = row.findIndex(c => c.includes("ARTÍCULO") || c === "ARTICULO");
                    colIdx.desc = row.indexOf("DESCRIPCIÓN") !== -1 ? row.indexOf("DESCRIPCIÓN") : row.indexOf("DESCRIPCION");
                    colIdx.cant = row.indexOf("CANTIDAD");
                    break; 
                }
            }

            // Si no encontró por nombre, usamos las fijas por defecto del reporte JDE
            if(colIdx.art === -1) { colIdx = { ubi: 0, art: 1, desc: 4, cant: 9 }; }

            rows.forEach(row => {
                let sku = row[colIdx.art] ? row[colIdx.art].toString().trim() : "";
                let cantRaw = row[colIdx.cant] ? row[colIdx.cant].toString() : "0";
                let cant = parseInt(cantRaw.replace(/[^\d]/g, ""));

                if(sku && !isNaN(sku) && sku.length > 2 && cant > 0) {
                    itemsFinal.push({
                        ubicacion: row[colIdx.ubi] || "S/D",
                        sku: sku,
                        descripcion: row[colIdx.desc] || "Sin Desc.",
                        cantidad: cant
                    });
                }
            });

            if(itemsFinal.length === 0) return alert("Error: No se pudieron leer datos. Asegúrate de estar usando el archivo LIMPIO.");
            
            armarPallets(itemsFinal);
        };
        reader.readAsArrayBuffer(file);
    }

    function armarPallets(items) {
        const pallets = [];
        let current = null;

        items.forEach(item => {
            const info = maestro[item.sku] || { "Base": 28, "Camada": 5, "Familia": "General" };
            const ubi = item.ubicacion.toUpperCase();
            let dep = ubi.startsWith("P00A") ? "Dep. 1" : ubi.startsWith("P014") ? "Dep. 3" : "Dep. 2";
            const capacidad = (parseInt(info.Base) || 28) * (parseInt(info.Camada) || 5);

            if (!current || current.dep !== dep || current.familia !== info.Familia || (current.total + item.cantidad) > (capacidad + 5)) {
                if (current) pallets.push(current);
                current = { id: pallets.length + 1, dep, familia: info.Familia, items: [], total: 0 };
            }
            current.items.push(item);
            current.total += item.cantidad;
        });
        if (current) pallets.push(current);
        render(pallets);
    }

    function render(pallets) {
        document.getElementById('resultadosArea').style.display = 'block';
        const tCon = document.getElementById('tabsContainer');
        const pCon = document.getElementById('palletsContainer');
        tCon.innerHTML = ""; pCon.innerHTML = "";

        pallets.forEach((p, idx) => {
            const tab = document.createElement('div');
            tab.className = `pm-tab ${idx===0?'active':''}`;
            tab.innerText = `PM ${p.id}`;
            tab.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(e => e.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`p-${p.id}`).classList.add('active');
            };
            tCon.appendChild(tab);

            const card = document.createElement('div');
            card.id = `p-${p.id}`;
            card.className = `pallet-card ${idx===0?'active':''}`;
            card.innerHTML = `
                <h2 style="margin-bottom:5px;">Pallet #${p.id} - ${p.dep}</h2>
                <p><b>Familia:</b> ${p.familia} | <span class="badge">Total: ${p.total} Bultos</span></p>
                <table>
                    <thead><tr><th>Ubicación</th><th>Art.</th><th>Descripción</th><th>Cant</th></tr></thead>
                    <tbody>${p.items.map(i => `<tr><td>${i.ubicacion}</td><td>${i.sku}</td><td>${i.descripcion}</td><td>${i.cantidad}</td></tr>`).join('')}</tbody>
                </table>
            `;
            pCon.appendChild(card);
        });
    }
</script>
</body>
</html>
