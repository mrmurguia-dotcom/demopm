<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Picking Final - Formato Nativo JDE</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0056b3; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 30px; padding-bottom: 10px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card-input { border: 2px solid #e1e4e8; padding: 20px; border-radius: 10px; transition: 0.3s; }
        .card-input:hover { border-color: var(--primary); }
        .btn-main { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2em; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-main:hover { background: #218838; transform: translateY(-2px); }
        
        /* Estilos de los Pallets Generados */
        .pm-nav { display: flex; gap: 8px; margin: 25px 0; overflow-x: auto; padding-bottom: 10px; }
        .pm-tab { background: #dee2e6; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.2s; }
        .pm-tab.active { background: var(--primary); color: white; }
        .pallet-card { display: none; border: 1px solid #ced4da; padding: 25px; border-radius: 12px; background: #fff; }
        .pallet-card.active { display: block; animation: fadeIn 0.4s; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; color: #495057; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
        .badge-dep { background: #e7f3ff; color: #007bff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media print { .no-print { display: none !important; } .pallet-card { display: block !important; page-break-after: always; border: none; box-shadow: none; } }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header">
        <h1>📦 Armado de Picking Final</h1>
        <p>Compatible con archivos nativos de JDE (.xls HTML)</p>
    </div>

    <div class="grid-inputs">
        <div class="card-input">
            <strong>1. Maestro de Capacidades (.xlsx)</strong><br><br>
            <input type="file" id="masterFile" accept=".xlsx">
        </div>
        <div class="card-input">
            <strong>2. Reporte de Surtido (.xls Nativo)</strong><br><br>
            <input type="file" id="surtidoFile">
        </div>
    </div>

    <button class="btn-main" onclick="procesarTodo()">⚡ GENERAR HOJAS DE RUTA</button>

    <div id="status" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
</div>

<div id="resultado" class="container" style="display:none; margin-top: 20px;">
    <div id="tabs" class="pm-nav no-print"></div>
    <div id="pallets"></div>
    <button class="btn-main no-print" onclick="window.print()" style="background: #343a40;">🖨️ IMPRIMIR TODO EL SURTIDO</button>
</div>

<script>
    let maestro = JSON.parse(localStorage.getItem('maestro_jde')) || {};

    // Cargar Maestro
    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            maestro = {};
            data.slice(1).forEach(r => {
                let sku = (r[1] || "").toString().trim();
                if(sku) {
                    maestro[sku] = {
                        cap: (parseInt(r[5]) * parseInt(r[6])) || 120,
                        fam: (r[8] || "9").toString().trim()
                    };
                }
            });
            localStorage.setItem('maestro_jde', JSON.stringify(maestro));
            alert("✅ Maestro sincronizado.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    async function procesarTodo() {
        const file = document.getElementById('surtidoFile').files[0];
        if(!file) return alert("Subí el surtido.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            // IMPORTANTE: Le decimos a la librería que force la lectura como HTML/Nativo
            const wb = XLSX.read(content, {type: 'binary', cellNF: false, cellText: false});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, defval: ""});

            let items = [];
            // Usamos los índices que descubrimos en el escáner
            rows.forEach(r => {
                let ubi = (r[0] || "").toString().trim();
                let sku = (r[1] || "").toString().trim();
                let cantStr = (r[8] || "").toString().trim();

                if(ubi.includes(".") && !isNaN(sku) && sku !== "") {
                    let cant = parseInt(cantStr.replace(/[^\d]/g, "")) || 0;
                    if(cant > 0) {
                        items.push({
                            ubi, 
                            sku, 
                            desc: (r[4] || ""), 
                            cant,
                            dep: (ubi.startsWith("14.") || ubi.includes("P0.14")) ? "Dep. 2" : "Dep. 1"
                        });
                    }
                }
            });

            if(items.length === 0) return alert("❌ No se detectaron productos. Verificá que sea el archivo de surtido correcto.");
            
            items.sort((a, b) => a.ubi.localeCompare(b.ubi));
            generarLogicaPallets(items);
        };
        reader.readAsBinaryString(file); // Leemos como string para capturar el HTML interno
    }

    function generarLogicaPallets(items) {
        const pallets = [];
        let current = null;

        items.forEach(it => {
            let m = maestro[it.sku] || { cap: 120, fam: "9" };
            let familia = it.desc.toUpperCase().includes("ANTARES") ? "ANT" : m.fam;
            let capacidad = familia === "ANT" ? 350 : m.cap;

            if(!current || current.dep !== it.dep || current.fam !== familia || (current.total + it.cant) > capacidad) {
                if(current) pallets.push(current);
                current = {
                    id: pallets.length + 1,
                    dep: it.dep,
                    fam: familia,
                    cap: capacidad,
                    total: 0,
                    items: []
                };
            }
            current.items.push(it);
            current.total += it.cant;
        });
        if(current) pallets.push(current);
        renderPallets(pallets);
    }

    function renderPallets(pallets) {
        document.getElementById('resultado').style.display = "block";
        const tabs = document.getElementById('tabs');
        const cont = document.getElementById('pallets');
        tabs.innerHTML = ""; cont.innerHTML = "";

        pallets.forEach((p, idx) => {
            const btn = document.createElement('div');
            btn.className = `pm-tab ${idx === 0 ? 'active' : ''}`;
            btn.innerText = `PM #${p.id} (${p.fam})`;
            btn.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('p-' + p.id).classList.add('active');
            };
            tabs.appendChild(btn);

            const card = document.createElement('div');
            card.id = 'p-' + p.id;
            card.className = `pallet-card ${idx === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="margin:0;">Hoja de Picking - Pallet #${p.id}</h2>
                    <span class="badge badge-dep">${p.dep}</span>
                </div>
                <p><strong>Familia:</strong> ${p.fam} | <strong>Ocupación:</strong> ${p.total} / ${p.cap} CA (${Math.round(p.total/p.cap*100)}%)</p>
                <table>
                    <thead><tr><th>Ubicación</th><th>SKU</th><th>Descripción</th><th>Cant</th></tr></thead>
                    <tbody>${p.items.map(i => `<tr><td><b>${i.ubi}</b></td><td>${i.sku}</td><td>${i.desc}</td><td>${i.cant} CA</td></tr>`).join('')}</tbody>
                </table>
                <div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px; font-size:0.9em; color:#666;">
                    Firma Responsable: ___________________________
                </div>
            `;
            cont.appendChild(card);
        });
    }
</script>
</body>
</html>
