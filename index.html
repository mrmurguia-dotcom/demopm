<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Picking JDE v13.0 - Detector Dinámico</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #2ea44f; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .box { border: 2px dashed #ccc; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .btn-gen { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .pm-nav { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; }
        .pm-tab { background: #eee; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
        .pm-tab.active { background: var(--primary); color: white; }
        .pallet-card { display: none; border: 1px solid #ddd; padding: 20px; border-radius: 10px; }
        .pallet-card.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .badge { background: #e8f0fe; color: #1967d2; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; }
        @media print { .box, .pm-nav, .btn-gen, h1 { display: none !important; } .pallet-card { display: block !important; page-break-after: always; border: none; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">📦 Picking v13.0 (Fila Dinámica)</h1>

    <div class="box">
        <strong>1. Maestro de Productos:</strong><br><br>
        <input type="file" id="masterFile" accept=".xlsx, .xls">
    </div>

    <div class="box">
        <strong>2. Reporte JDE:</strong><br><br>
        <input type="file" id="surtidoFile" accept=".xlsx, .xls">
        <button class="btn-gen" onclick="ejecutar()">🚀 PROCESAR SURTIDO</button>
    </div>

    <div id="resArea" style="display:none;">
        <div id="tabs" class="pm-nav"></div>
        <div id="pallets"></div>
        <button onclick="window.print()" style="width:100%; padding:15px; margin-top:20px; cursor:pointer;">🖨️ IMPRIMIR TODO</button>
    </div>
</div>

<script>
    let maestroData = JSON.parse(localStorage.getItem('m_v13')) || {};

    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            maestroData = {};
            rows.forEach((row, i) => {
                if(i === 0) return;
                let sku = (row[1] || "").toString().trim();
                if(sku) {
                    maestroData[sku] = {
                        base: parseFloat(row[5]) || 0,
                        camada: parseFloat(row[6]) || 0,
                        familia: (row[8] || "9").toString().trim()
                    };
                }
            });
            localStorage.setItem('m_v13', JSON.stringify(maestroData));
            alert("Maestro cargado.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function ejecutar() {
        const file = document.getElementById('surtidoFile').files[0];
        if(!file) return alert("Subí el reporte de JDE.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, defval: ""});

            let startIndex = -1;
            // ESCANEO DINÁMICO: Buscamos en qué fila están los encabezados
            for(let i=0; i < rows.length; i++) {
                let txtA = (rows[i][0] || "").toString().toUpperCase();
                let txtB = (rows[i][1] || "").toString().toUpperCase();
                
                // Si la celda A tiene "UBIC" y la B tiene "ART", encontramos la tabla
                if(txtA.includes("UBIC") && txtB.includes("ART")) {
                    startIndex = i + 1; // La data empieza en la siguiente fila
                    break;
                }
            }

            if(startIndex === -1) {
                return alert("No se detectó la tabla. Asegurate que el reporte tenga las columnas 'Ubicación' y 'Artículo'.");
            }

            let items = [];
            for(let j = startIndex; j < rows.length; j++) {
                let r = rows[j];
                let ubi = (r[0] || "").toString().trim();
                let sku = (r[1] || "").toString().trim();
                let desc = (r[4] || "").toString().trim();
                let cantRaw = (r[8] || "").toString().trim(); // Columna I (Cantidad)

                // Filtro: Si tiene ubicación con punto (ej: 14.0X) y hay SKU, es un producto válido
                if(ubi.includes(".") && sku !== "") {
                    // Limpieza profunda de la cantidad (quitar "CA", espacios, etc)
                    let cant = parseInt(cantRaw.replace(/[^\d]/g, "")) || 0;
                    if(cant > 0) {
                        items.push({ ubi, sku, desc, cant });
                    }
                }
            }

            if(items.length === 0) return alert("No se encontraron productos con cantidades válidas.");
            procesarLogica(items);
        };
        reader.readAsArrayBuffer(file);
    }

    function procesarLogica(items) {
        // Ordenar por ubicación para recorrido lógico
        items.sort((a, b) => a.ubi.localeCompare(b.ubi));

        const pallets = [];
        let current = null;

        items.forEach(it => {
            let m = maestroData[it.sku];
            let fam = m ? m.familia : "9";
            let cap = (m && m.base > 0 && m.camada > 0) ? Math.floor(m.base * m.camada) : 100;

            // Lógica especial Antares
            if(it.desc.toUpperCase().includes("ANTARES")) { fam = "ANT"; cap = 300; }

            let dep = (it.ubi.includes("P0.14") || it.ubi.includes("P014")) ? "Dep. 2" : "Dep. 1";

            if(!current || current.dep !== dep || current.fam !== fam || (current.total + it.cant) > current.cap) {
                if(current) pallets.push(current);
                current = { id: pallets.length + 1, dep, fam, cap, total: 0, items: [] };
            }
            
            current.items.push(it);
            current.total += it.cant;
        });

        if(current) pallets.push(current);
        renderHTML(pallets);
    }

    function renderHTML(pallets) {
        document.getElementById('resArea').style.display = "block";
        const tabs = document.getElementById('tabs');
        const cont = document.getElementById('pallets');
        tabs.innerHTML = ""; cont.innerHTML = "";

        pallets.forEach((p, idx) => {
            const btn = document.createElement('div');
            btn.className = `pm-tab ${idx === 0 ? 'active' : ''}`;
            btn.innerText = `PM ${p.id}`;
            btn.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('p-' + p.id).classList.add('active');
            };
            tabs.appendChild(btn);

            const card = document.createElement('div');
            card.id = 'p-' + p.id;
            card.className = `pallet-card ${idx === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <h2>Pallet #${p.id} <small>(${p.dep})</small></h2>
                <p><strong>Familia:</strong> ${p.fam} | <strong>Total:</strong> ${p.total} CA</p>
                <table>
                    <thead><tr><th>Ubicación</th><th>SKU</th><th>Descripción</th><th>Cant</th></tr></thead>
                    <tbody>
                        ${p.items.map(i => `<tr><td>${i.ubi}</td><td>${i.sku}</td><td>${i.desc}</td><td>${i.cant}</td></tr>`).join('')}
                    </tbody>
                </table>
            `;
            cont.appendChild(card);
        });
    }
</script>
</body>
</html>
