<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Picking JDE v21.1 - Clean Header</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .box { border: 2px solid #eee; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .btn-gen { background: #27ae60; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .pm-nav { display: flex; gap: 8px; margin: 20px 0; overflow-x: auto; padding-bottom: 5px; }
        .pm-tab { background: #dfe6e9; padding: 10px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.85em; font-weight: bold; }
        .pm-tab.active { background: var(--primary); color: white; }
        .pallet-card { display: none; border: 1px solid #ccc; padding: 40px; border-radius: 0; background: white; }
        .pallet-card.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f2f2f2; padding: 12px; text-align: left; border: 1px solid #333; font-size: 0.9em; }
        td { padding: 12px; border: 1px solid #333; font-size: 1em; }
        .header-print { border-bottom: 4px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .pdf-btn { width: 100%; padding: 18px; margin-top: 20px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .badge-order { border: 2px solid #000; padding: 5px 15px; font-weight: bold; font-size: 1.2em; display: inline-block; }
        .dep-info { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; color: #555; }
        @media print { 
            .no-print { display: none !important; } 
            .pallet-card { display: block !important; page-break-after: always; border: none; padding: 0; margin: 0; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <h1 style="text-align:center;">📦 Control de Picking v21.1</h1>
    
    <div class="box">
        <strong>1. Maestro de Capacidades (.xlsx):</strong><br><br>
        <input type="file" id="masterFile" accept=".xlsx">
    </div>

    <div class="box">
        <strong>2. Reporte de Surtido JDE (.xls):</strong><br><br>
        <input type="file" id="surtidoFile">
        <br><br>
        <button class="btn-gen" onclick="procesar()">⚡ GENERAR PALLETS MIXTOS</button>
    </div>
</div>

<div id="resArea" class="container" style="display:none; margin-top:20px;">
    <div id="tabs" class="pm-nav no-print"></div>
    <div id="pallets"></div>
    <button class="pdf-btn no-print" onclick="window.print()">📄 EXPORTAR A PDF / IMPRIMIR</button>
</div>

<script>
    let maestroData = JSON.parse(localStorage.getItem('m_v21_1')) || {};

    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            maestroData = {};
            rows.slice(1).forEach(r => {
                let sku = (r[1] || "").toString().trim();
                if(sku) {
                    maestroData[sku] = {
                        cap: (parseInt(r[5]) * parseInt(r[6])) || 120,
                        fam: (r[8] || "9").toString().trim()
                    };
                }
            });
            localStorage.setItem('m_v21_1', JSON.stringify(maestroData));
            alert("Maestro sincronizado.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function procesar() {
        const file = document.getElementById('surtidoFile').files[0];
        if(!file) return alert("Subí el archivo de JDE.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const parser = new DOMParser();
            const doc = parser.parseFromString(content, "text/html");
            
            const fullText = doc.body.innerText || "";
            const cargaMatch = fullText.match(/Interno\s+(\d+)/i) || fullText.match(/Carga[:\s]+(\d+)/i);
            const nroCarga = cargaMatch ? cargaMatch[1] : "SIN CARGA";

            let itemsRaw = [];
            const rows = doc.querySelectorAll('tr');

            rows.forEach(tr => {
                const cells = Array.from(tr.querySelectorAll('td, th')).map(c => c.textContent.replace(/\s+/g, ' ').trim());
                if(cells.length >= 9) {
                    let ubi = cells[0];
                    let sku = cells[1];
                    let orden = cells[6];
                    let linea = cells[7];
                    let cant = parseInt(cells[8]);

                    if(ubi.includes(".") && !isNaN(parseInt(sku)) && !isNaN(cant)) {
                        let depPart = ubi.split('.')[1] || "00";
                        let depId = "P0" + depPart; 

                        let m = maestroData[sku] || { cap: 120, fam: "9" };
                        let fam = cells[4].toUpperCase().includes("ANTARES") ? "ANT" : m.fam;
                        let cap = fam === "ANT" ? 350 : m.cap;

                        itemsRaw.push({ ubi, sku, desc: cells[4], orden, linea, cant, fam, cap, depId, nroCarga });
                    }
                }
            });

            if(itemsRaw.length === 0) return alert("No se detectaron datos válidos.");

            itemsRaw.sort((a, b) => {
                if (a.depId !== b.depId) return a.depId.localeCompare(b.depId);
                if (a.orden !== b.orden) return a.orden.localeCompare(b.orden);
                if (a.fam !== b.fam) return a.fam.localeCompare(b.fam);
                return a.ubi.localeCompare(b.ubi);
            });

            armarPallets(itemsRaw);
        };
        reader.readAsText(file, "ISO-8859-1");
    }

    function armarPallets(items) {
        const pallets = [];
        let current = null;
        let globalCounter = 1;

        items.forEach(it => {
            let hayEspacio = current && (current.total + it.cant <= current.cap);
            
            if (!current || current.depId !== it.depId || current.orden !== it.orden || !hayEspacio) {
                current = {
                    id: globalCounter++,
                    dep: it.depId,
                    carga: it.nroCarga,
                    orden: it.orden,
                    cap: it.cap,
                    total: 0,
                    items: []
                };
                pallets.push(current);
            }
            current.items.push(it);
            current.total += it.cant;
        });

        render(pallets);
    }

    function render(pallets) {
        document.getElementById('resArea').style.display = "block";
        const tabs = document.getElementById('tabs');
        const cont = document.getElementById('pallets');
        tabs.innerHTML = ""; cont.innerHTML = "";

        pallets.forEach((p, idx) => {
            const btn = document.createElement('div');
            btn.className = `pm-tab ${idx === 0 ? 'active' : ''}`;
            btn.innerText = `PM #${p.id} - ${p.carga}`;
            btn.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('p-' + p.id).classList.add('active');
            };
            tabs.appendChild(btn);

            const card = document.createElement('div');
            card.id = 'p-' + p.id;
            card.className = `pallet-card ${idx === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <div class="header-print">
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div>
                            <h1 style="margin:0; font-size: 2.5em;">Hoja de Ruta: ${p.carga}</h1>
                            <div class="dep-info">Depósito: ${p.dep} | Pallet Mixto #${p.id}</div>
                        </div>
                        <div style="text-align:right;">
                            <div class="badge-order">ORDEN: ${p.orden}</div>
                        </div>
                    </div>
                </div>
                
                <div style="margin-bottom:20px; font-size: 1.1em; display: flex; justify-content: space-between;">
                    <span><strong>Ocupación:</strong> ${p.total} / ${p.cap} cajas</span>
                    <span><strong>Fecha:</strong> ${new Date().toLocaleDateString()}</span>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th style="width:15%">Ubicación</th>
                            <th style="width:10%">SKU</th>
                            <th style="width:50%">Descripción del Artículo</th>
                            <th style="width:10%">Línea</th>
                            <th style="width:15%; text-align:center;">Cant.</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${p.items.map(i => `
                            <tr>
                                <td><b>${i.ubi}</b></td>
                                <td>${i.sku}</td>
                                <td style="font-size: 0.9em;">${i.desc}</td>
                                <td>${i.linea}</td>
                                <td style="text-align:center; font-weight:bold; font-size:1.2em;">${i.cant}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                
                <div style="margin-top:60px; display:flex; justify-content:space-between;">
                    <div style="border-top: 2px solid #000; width: 250px; text-align:center; padding-top:5px; font-weight: bold;">Preparado por</div>
                    <div style="border-top: 2px solid #000; width: 250px; text-align:center; padding-top:5px; font-weight: bold;">Control Despacho</div>
                    <div style="text-align:right;">Pág. ${p.id}</div>
                </div>
            `;
            cont.appendChild(card);
        });
    }
</script>
</body>
</html>
