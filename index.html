<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistente de Picking v12.0 - Columnas Dinámicas</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0056b3; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #333;}
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .box { border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #fff;}
        .btn-gen { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.1em;}
        .pm-nav { display: flex; gap: 8px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .pm-tab { background: #e0e0e0; padding: 10px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold;}
        .pm-tab.active { background: var(--primary); color: white; }
        .pallet-card { display: none; border: 2px solid #eee; padding: 20px; border-radius: 10px; }
        .pallet-card.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .badge { background: #ffc107; padding: 4px 10px; border-radius: 10px; font-size: 0.8em; font-weight: bold; }
        @media print { .config-grid, .pm-nav, button { display: none !important; } .pallet-card { display: block !important; page-break-after: always; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--primary);">📦 Optimizador de Picking</h1>

    <div class="config-grid">
        <div class="box">
            <strong>📂 1. Maestro de Capacidades:</strong><br><br>
            <input type="file" id="masterFile" accept=".xlsx, .xls">
        </div>
        <div class="box">
            <strong>🚚 2. Reporte de Surtido JDE:</strong><br><br>
            <input type="file" id="surtidoFile" accept=".xlsx, .xls">
            <button class="btn-gen" onclick="ejecutar()">🚀 GENERAR PALLETS</button>
        </div>
    </div>

    <div id="resArea" style="display:none;">
        <div id="tabs" class="pm-nav"></div>
        <div id="pallets"></div>
        <button onclick="window.print()" style="width:100%; padding:15px; margin-top:20px; cursor:pointer; background:#333; color:white; border-radius:8px; font-weight:bold;">🖨️ IMPRIMIR HOJAS DE RUTA</button>
    </div>
</div>

<script>
    let maestroData = JSON.parse(localStorage.getItem('m_v12')) || {};

    // Cargar Maestro
    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            maestroData = {};
            rows.forEach((row, i) => {
                if(i === 0) return;
                let sku = (row[1] || "").toString().trim(); // Col B
                if(sku) {
                    maestroData[sku] = {
                        base: parseFloat(row[5]) || 0,
                        camada: parseFloat(row[6]) || 0,
                        familia: (row[8] || "9").toString().trim()
                    };
                }
            });
            localStorage.setItem('m_v12', JSON.stringify(maestroData));
            alert("✅ Maestro cargado correctamente.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function ejecutar() {
        const file = document.getElementById('surtidoFile').files[0];
        if(!file) return alert("Por favor, seleccioná el archivo de surtido.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, defval: ""});

            // 1. Buscar sección Pallet Mixto
            let startIndex = -1;
            for(let i=0; i < rows.length; i++) {
                let txt = rows[i].join(" ").toUpperCase();
                if(txt.includes("PALLET MIXTO") || txt.includes("SURTIDO PM")) { 
                    startIndex = i;
                    break;
                }
            }

            if(startIndex === -1) return alert("No se encontró la sección de Pallets Mixtos en el reporte.");

            // 2. LECTURA DINÁMICA DE COLUMNAS (La magia está acá)
            let colUbi = 0, colSku = 1, colDesc = 4, colCant = 8; // Valores por defecto
            
            // Buscamos la fila de títulos justo debajo de "Pallet Mixto"
            for(let i = startIndex; i < rows.length; i++) {
                let txt = rows[i].join(" ").toUpperCase();
                if(txt.includes("UBICACI") && (txt.includes("ARTÍCULO") || txt.includes("ARTICULO"))) {
                    for(let c=0; c < rows[i].length; c++) {
                        let header = (rows[i][c] || "").toString().toUpperCase();
                        if(header.includes("UBICACI")) colUbi = c;
                        if(header.includes("ARTÍCULO") || header.includes("ARTICULO")) colSku = c;
                        if(header.includes("DESCRIPCI")) colDesc = c;
                        if(header.includes("CANTIDA") || header.includes("CANT")) colCant = c;
                    }
                    startIndex = i + 1; // Empezar a leer datos justo debajo de los títulos
                    break;
                }
            }

            // 3. Extraer productos usando las columnas correctas
            let items = [];
            for(let j = startIndex; j < rows.length; j++) {
                let r = rows[j];
                let ubi = (r[colUbi] || "").toString().trim();
                let sku = (r[colSku] || "").toString().trim();
                let cantStr = (r[colCant] || "").toString().replace(/[^\d]/g, "");
                let cant = parseInt(cantStr);
                
                // Si la fila tiene Ubicación, SKU y una cantidad válida, la sumamos.
                if(ubi && sku && sku.length >= 2 && !isNaN(cant) && cant > 0) {
                    items.push({
                        ubi: ubi,
                        sku: sku,
                        desc: (r[colDesc] || "").toString().trim(),
                        cant: cant
                    });
                }
            }

            if(items.length === 0) return alert("Se encontró la sección 'Pallet Mixto', pero no se pudieron leer los productos. Verificá el formato del Excel.");
            
            procesarAgrupado(items);
        };
        reader.readAsArrayBuffer(file);
    }

    function procesarAgrupado(items) {
        items.sort((a, b) => a.ubi.localeCompare(b.ubi));

        const pallets = [];
        let current = null;

        items.forEach(it => {
            let m = maestroData[it.sku];
            let fam = m ? m.familia : "9";
            
            // Calculamos capacidad (Si el maestro está vacío o da 0, asume 140)
            let cap = (m && m.base > 0 && m.camada > 0) ? Math.floor(m.base * m.camada) : 140; 

            // Regla Antares
            if(it.desc.toUpperCase().includes("ANTARES")) {
                fam = "ANTARES";
                cap = 450; 
            }

            let dep = (it.ubi.includes("P0.14") || it.ubi.includes("P014")) ? "Dep. 2" : "Dep. 1";

            if(!current || current.dep !== dep || current.fam !== fam || (current.total + it.cant) > current.cap) {
                if(current) pallets.push(current);
                current = { id: pallets.length + 1, dep: dep, fam: fam, cap: cap, total: 0, items: [] };
            }
            current.items.push(it);
            current.total += it.cant;
        });

        if(current) pallets.push(current);
        render(pallets);
    }

    function render(pallets) {
        document.getElementById('resArea').style.display = "block";
        const tabs = document.getElementById('tabs');
        const cont = document.getElementById('pallets');
        tabs.innerHTML = ""; cont.innerHTML = "";

        pallets.forEach((p, idx) => {
            const btn = document.createElement('div');
            btn.className = `pm-tab ${idx === 0 ? 'active' : ''}`;
            btn.innerText = `PM ${p.id}`;
            btn.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('p-' + p.id).classList.add('active');
            };
            tabs.appendChild(btn);

            const card = document.createElement('div');
            card.id = 'p-' + p.id;
            card.className = `pallet-card ${idx === 0 ? 'active' : ''}`;
            let ocupacion = Math.round((p.total / p.cap) * 100);
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>Pallet #${p.id} <span style="font-size:0.6em; color:#666;">(${p.dep})</span></h2>
                    <span class="badge">FAMILIA: ${p.fam}</span>
                </div>
                <p><strong>Total: ${p.total} CA</strong> <small>(Cap. Máx: ${p.cap} | Ocupación: ${ocupacion}%)</small></p>
                <table>
                    <thead><tr><th>Ubicación</th><th>SKU</th><th>Descripción</th><th>Cant</th></tr></thead>
                    <tbody>${p.items.map(i => `<tr><td><b>${i.ubi}</b></td><td>${i.sku}</td><td>${i.desc}</td><td>${i.cant}</td></tr>`).join('')}</tbody>
                </table>
            `;
            cont.appendChild(card);
        });
    }
</script>
</body>
</html>
