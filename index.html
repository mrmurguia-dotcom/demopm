<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Picking JDE v19.0 - Smart Packing</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #6f42c1; --success: #20c997; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); padding: 20px; color: #343a40; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .box { border: 2px solid #e9ecef; padding: 20px; border-radius: 8px; margin-bottom: 20px; transition: 0.3s; }
        .box:hover { border-color: var(--primary); }
        .btn-gen { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.2s; }
        .btn-gen:hover { background: #1aa179; transform: translateY(-2px); }
        .pm-nav { display: flex; gap: 8px; margin: 20px 0; overflow-x: auto; padding-bottom: 5px; }
        .pm-tab { background: #e9ecef; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 0.9em; font-weight: 600; color: #495057; white-space: nowrap; }
        .pm-tab.active { background: var(--primary); color: white; }
        .pallet-card { display: none; border: 1px solid #dee2e6; padding: 25px; border-radius: 10px; background: white; margin-bottom: 20px; }
        .pallet-card.active { display: block; animation: fadeIn 0.4s; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.95em; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; color: #495057; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .badge { background: #e0cffc; color: #5227a1; padding: 5px 12px; border-radius: 12px; font-size: 0.85em; font-weight: bold; }
        .badge-fam { background: #e9ecef; color: #495057; font-size: 0.8em; padding: 3px 8px; border-radius: 8px; margin-right: 5px; }
        .pdf-btn { width: 100%; padding: 18px; margin-top: 20px; cursor: pointer; background: #dc3545; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em; transition: 0.2s; }
        .pdf-btn:hover { background: #c82333; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Estilos para que el PDF salga perfecto */
        @media print { 
            body { background: white; padding: 0; }
            .no-print { display: none !important; } 
            .pallet-card { display: block !important; page-break-inside: avoid; page-break-after: always; border: none; padding: 0; margin-bottom: 50px; } 
        }
    </style>
</head>
<body>

<div class="container no-print">
    <h1 style="text-align:center; margin-bottom:10px;">📦 Picking JDE v19.0</h1>
    <p style="text-align:center; color:#6c757d; margin-bottom:30px;">Extracción DOM Nativa + Smart Packing (Llenado Optimizado)</p>

    <div class="box">
        <strong>1. Maestro de Capacidades (.xlsx):</strong><br><br>
        <input type="file" id="masterFile" accept=".xlsx">
    </div>

    <div class="box">
        <strong>2. Reporte de Surtido JDE (.xls nativo):</strong><br><br>
        <input type="file" id="surtidoFile">
        <br><br>
        <button class="btn-gen" onclick="procesar()">⚡ PROCESAR Y GENERAR</button>
    </div>
</div>

<div id="resArea" class="container" style="display:none; margin-top:20px; max-width: 1000px;">
    <div id="tabs" class="pm-nav no-print"></div>
    <div id="pallets"></div>
    <button class="pdf-btn no-print" onclick="exportarPDF()">📄 EXPORTAR A PDF</button>
    <p class="no-print" style="text-align: center; color: #6c757d; font-size: 0.9em; margin-top: 10px;">💡 Tip: En la ventana que se abre, elegí "Guardar como PDF" como impresora.</p>
</div>

<script>
    let maestroData = JSON.parse(localStorage.getItem('m_v18')) || {};

    // 1. CARGA DEL MAESTRO
    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            maestroData = {};
            rows.slice(1).forEach(r => {
                let sku = (r[1] || "").toString().trim();
                if(sku) {
                    maestroData[sku] = {
                        cap: (parseInt(r[5]) * parseInt(r[6])) || 120,
                        fam: (r[8] || "9").toString().trim()
                    };
                }
            });
            localStorage.setItem('m_v18', JSON.stringify(maestroData));
            alert("✅ Maestro sincronizado correctamente.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    // 2. EXTRACCIÓN DE DATOS JDE
    function procesar() {
        const file = document.getElementById('surtidoFile').files[0];
        if(!file) return alert("Por favor, subí el archivo de surtido de JDE.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const parser = new DOMParser();
            const doc = parser.parseFromString(content, "text/html");
            let itemsRaw = [];

            // Estrategia DOM Parser (La que funcionó)
            const rows = doc.querySelectorAll('tr');
            rows.forEach(tr => {
                const cells = Array.from(tr.querySelectorAll('td, th')).map(c => c.textContent.replace(/\s+/g, ' ').trim());
                if(cells.length >= 9) {
                    let ubi = cells[0];
                    let sku = cells[1];
                    let desc = cells[4];
                    let cantRaw = cells[8];
                    
                    if(ubi.includes(".") && ubi.length > 5 && !isNaN(parseInt(sku))) {
                        let cant = parseInt(cantRaw.replace(/[^\d]/g, "")) || 0;
                        if(cant > 0) itemsRaw.push({ ubi, sku, desc, cant });
                    }
                }
            });

            if(itemsRaw.length === 0) return alert("❌ No se detectaron productos.");
            
            enriquecerYEmpacar(itemsRaw);
        };
        reader.readAsText(file, "ISO-8859-1"); 
    }

    // 3. LOGICA DE EMPAQUETADO INTELIGENTE (SMART PACKING)
    function enriquecerYEmpacar(itemsRaw) {
        // Enriquecemos con variables del maestro
        let items = itemsRaw.map(it => {
            let m = maestroData[it.sku] || { cap: 120, fam: "9" };
            let fam = it.desc.toUpperCase().includes("ANTARES") ? "ANT" : m.fam;
            let cap = fam === "ANT" ? 350 : m.cap;
            let dep = (it.ubi.startsWith("14.") || it.ubi.includes("P0.14")) ? "Dep. 2" : "Dep. 1";
            return { ...it, fam, cap, dep };
        });

        // ORDENAMIENTO PRIORITARIO: 1° Depósito, 2° Familia, 3° Ubicación
        items.sort((a, b) => {
            if (a.dep !== b.dep) return a.dep.localeCompare(b.dep);
            if (a.fam !== b.fam) return a.fam.localeCompare(b.fam);
            return a.ubi.localeCompare(b.ubi);
        });

        const pallets = [];
        let current = null;

        // LLENADO DE PALLETS
        items.forEach(it => {
            let cantRestante = it.cant;
            
            while(cantRestante > 0) {
                // Si no hay pallet actual, cambiamos de depósito, o el pallet actual está LLENO -> Creamos uno nuevo
                if (!current || current.dep !== it.dep || current.total >= current.cap) {
                    current = { 
                        id: pallets.length + 1, 
                        dep: it.dep, 
                        cap: it.cap, // La capacidad base la da el primer producto que entra
                        total: 0, 
                        fams: new Set(),
                        items: [] 
                    };
                    pallets.push(current);
                }
                
                // Calculamos cuánto espacio le queda a este pallet
                let espacioLibre = current.cap - current.total;
                // Metemos lo que alcance (ya sea toda la cantRestante, o solo lo que entra para llenarlo)
                let aInsertar = Math.min(cantRestante, espacioLibre);
                
                current.items.push({
                    ubi: it.ubi,
                    sku: it.sku,
                    desc: it.desc,
                    cant: aInsertar,
                    fam: it.fam
                });
                
                current.total += aInsertar;
                current.fams.add(it.fam);
                cantRestante -= aInsertar; // Descontamos lo que ya metimos
            }
        });

        render(pallets);
    }

    // 4. RENDERIZADO VISUAL
    function render(pallets) {
        document.getElementById('resArea').style.display = "block";
        const tabs = document.getElementById('tabs');
        const cont = document.getElementById('pallets');
        tabs.innerHTML = ""; cont.innerHTML = "";

        pallets.forEach((p, idx) => {
            // Pestañas (Navegación)
            const btn = document.createElement('div');
            btn.className = `pm-tab ${idx === 0 ? 'active' : ''}`;
            btn.innerText = `Pallet #${p.id} (${p.total}/${p.cap})`;
            btn.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('p-' + p.id).classList.add('active');
            };
            tabs.appendChild(btn);

            // Etiquetas de familias incluidas en este pallet
            const famBadges = Array.from(p.fams).map(f => `<span class="badge-fam">Fam: ${f}</span>`).join('');

            // Tarjetas PDF
            const card = document.createElement('div');
            card.id = 'p-' + p.id;
            card.className = `pallet-card ${idx === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #dee2e6; padding-bottom: 10px; margin-bottom: 15px;">
                    <h2 style="margin:0;">Hoja de Ruta - Pallet #${p.id}</h2>
                    <span class="badge">${p.dep}</span>
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>Ocupación:</strong> ${p.total} / ${p.cap} Cajas <br>
                    <div style="margin-top: 8px;">${famBadges}</div>
                </div>
                <table>
                    <thead><tr><th>Ubicación</th><th>SKU</th><th>Descripción</th><th style="text-align:right;">Cant</th></tr></thead>
                    <tbody>
                        ${p.items.map(i => `
                            <tr>
                                <td><b>${i.ubi}</b></td>
                                <td>${i.sku}</td>
                                <td>${i.desc}</td>
                                <td style="text-align:right; font-weight:bold; font-size: 1.1em;">${i.cant}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            cont.appendChild(card);
        });
    }

    function exportarPDF() {
        // El navegador abre la vista de impresión nativa. 
        // El CSS @media print se encarga de mostrar todos los pallets, quitar los botones e insertar saltos de página.
        window.print();
    }
</script>
</body>
</html>
