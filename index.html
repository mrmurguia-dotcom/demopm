<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimizador de Picking - Edición BI Publisher</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0056b3; --secondary: #e9ecef; --success: #28a745; --warning: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        .upload-section { display: flex; gap: 20px; margin-bottom: 20px; }
        .upload-box { flex: 1; border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; background-color: var(--secondary); }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .status-info { background: #fff3cd; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9em; border: 1px solid #ffeeba; }
        .pm-nav { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .pm-tab { background-color: var(--secondary); padding: 10px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .pm-tab.active { background-color: var(--primary); color: white; }
        .pallet-card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; display: none; }
        .pallet-card.active { display: block; }
        .pallet-header { background-color: #f8f9fa; padding: 15px; border-left: 5px solid var(--primary); margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 0.85em; }
        th { background-color: var(--primary); color: white; }
        @media print { .upload-section, .pm-nav, button { display: none; } .pallet-card { display: block !important; page-break-after: always; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Asistente de Armado (BIP Compatible)</h1>
    <div class="status-info">
        💡 <b>Tip JDE:</b> Si el error persiste, probá guardando el Excel como "Libro de Excel (.xlsx)" antes de subirlo.
    </div>

    <div class="upload-section">
        <div class="upload-box">
            <h3>1. Maestro</h3>
            <input type="file" id="masterFile" accept=".xlsx, .xls">
        </div>
        <div class="upload-box">
            <h3>2. Surtido (BIP)</h3>
            <input type="file" id="surtidoFile" accept=".xlsx, .xls">
            <button onclick="procesarExcelSurtido()">Generar Pallets</button>
        </div>
    </div>

    <div id="resultadosArea" style="display: none;">
        <div id="tabsContainer" class="pm-nav"></div>
        <div id="palletsContainer"></div>
        <button style="background: var(--success); width: 100%" onclick="window.print()">🖨️ Imprimir Todo</button>
    </div>
</div>

<script>
    let maestro = JSON.parse(localStorage.getItem('maestroConfig')) || {};

    const limpiar = (t) => t ? t.toString().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase() : "";

    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            maestro = {};
            data.forEach(item => { if(item.SKU) maestro[item.SKU] = item; });
            localStorage.setItem('maestroConfig', JSON.stringify(maestro));
            alert("Maestro cargado.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function procesarExcelSurtido() {
        const file = document.getElementById('surtidoFile').files[0];
        if (!file) return alert("Subí el surtido.");
        
        const reader = new FileReader();
        reader.onload = (e) => {
            // Leemos con 'cellText:false' para obtener los datos crudos del BI Publisher
            const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array', cellNF: true, cellText: false});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const raw = XLSX.utils.sheet_to_json(ws, {header: 1, defval: ""}); 

            let headerRow = -1;
            let nCarga = "S/D", nDep = "S/D";

            // ESCANEO TOTAL POR CONTENIDO (No por posición exacta)
            for(let i=0; i < raw.length; i++) {
                const fila = raw[i];
                for(let j=0; j < fila.length; j++) {
                    let txt = limpiar(fila[j]);
                    
                    if(txt.includes("CARGA")) nCarga = fila[j+1] || nCarga;
                    if(txt.includes("DEPOSI")) nDep = fila[j+1] || nDep;
                    
                    // Si encontramos la cabecera, marcamos la fila
                    if(txt.includes("UBIC") && txt.includes("ACION") && headerRow === -1) {
                        headerRow = i;
                    }
                }
            }

            if(headerRow === -1) {
                // Si falla el escaneo de celdas, intentamos buscar por "fuerza bruta" en la fila 10 a 15
                headerRow = raw.findIndex(r => r.some(c => limpiar(c).includes("UBIC")));
            }

            if(headerRow === -1) return alert("BI Publisher generó un formato no legible. Probá 'Guardar como' .xlsx en Excel y reintentá.");

            // Los datos de BIP suelen tener una fila de nombres y una vacía o con estilos
            const dataRows = raw.slice(headerRow + 1); 
            const items = [];

            dataRows.forEach(row => {
                // Buscamos el SKU en la columna 2 o 3 (BIP a veces desplaza celdas)
                let skuVal = row[2] ? row[2].toString().trim() : "";
                let ubicVal = row[0] ? row[0].toString().trim() : "";

                // Si no hay ubicación ni SKU, o es la fila de encabezado repetida, saltamos
                if(skuVal === "" || skuVal === "SKU" || ubicVal === "Ubicación") return;

                let desc = row[3] ? row[3].toString().toUpperCase() : "";
                if(desc.includes("HOMOGENEO")) return;

                items.push({
                    ubicacion: ubicVal,
                    sku: skuVal,
                    descripcion: row[3],
                    cantidad: parseInt(row[4].toString().replace(/\D/g, "")) || 0,
                    orden: row[7] || "S/D",
                    nCarga: `${nDep}-${nCarga}`
                });
            });

            if(items.length === 0) return alert("Se detectó el archivo pero no se pudieron extraer las líneas de picking.");
            armarPallets(items);
        };
        reader.readAsArrayBuffer(file);
    }

    // ... (Mismas funciones armarPallets y render de antes) ...
    function armarPallets(items) {
        const pallets = [];
        let current = null;
        items.forEach(item => {
            const info = maestro[item.sku] || { "Base": 28, "Camada": 5, "Familia": "General" };
            const ubi = item.ubicacion.toUpperCase();
            let dep = ubi.startsWith("P00A") ? "Dep. 1" : ubi.startsWith("P002") ? "Dep. 2" : "Dep. 3";
            const cap = (parseInt(info.Base) || 28) * (parseInt(info.Camada) || 5);
            if (!current || current.dep !== dep || current.familia !== info.Familia || (current.total + item.cantidad) > (cap + 2)) {
                if (current) pallets.push(current);
                current = { id: pallets.length + 1, dep, familia: info.Familia, base: info.Base, cam: info.Camada, orden: item.orden, nCarga: item.nCarga, items: [], total: 0 };
            }
            current.items.push(item);
            current.total += item.cantidad;
        });
        if (current) pallets.push(current);
        render(pallets);
    }

    function render(pallets) {
        const tCon = document.getElementById('tabsContainer');
        const pCon = document.getElementById('palletsContainer');
        tCon.innerHTML = ""; pCon.innerHTML = "";
        pallets.forEach((p, idx) => {
            const tab = document.createElement('div');
            tab.className = `pm-tab ${idx===0?'active':''}`;
            tab.innerText = `PM ${p.id}`;
            tab.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(e => e.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`p-${p.id}`).classList.add('active');
            };
            tCon.appendChild(tab);
            const card = document.createElement('div');
            card.id = `p-${p.id}`;
            card.className = `pallet-card ${idx===0?'active':''}`;
            card.innerHTML = `
                <div class="pallet-header">
                    <h3>PM #${p.id} - ${p.dep}</h3>
                    <p>Carga: <b>${p.nCarga}</b> | Orden: <b>${p.orden}</b></p>
                </div>
                <table>
                    <thead><tr><th>Ubicación</th><th>SKU</th><th>Descripción</th><th>Cant</th></tr></thead>
                    <tbody>${p.items.map(i => `<tr><td>${i.ubicacion}</td><td>${i.sku}</td><td>${i.descripcion}</td><td>${i.cantidad}</td></tr>`).join('')}</tbody>
                </table>
                <h4 style="text-align:right">Total: ${p.total} bultos</h4>`;
            pCon.appendChild(card);
        });
        document.getElementById('resultadosArea').style.display = 'block';
    }
</script>
</body>
</html>
