<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistente de Picking v11.1 - Estable</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0056b3; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .box { border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .btn-gen { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .pm-nav { display: flex; gap: 8px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .pm-tab { background: #e0e0e0; padding: 10px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .pm-tab.active { background: var(--primary); color: white; }
        .pallet-card { display: none; border: 2px solid #eee; padding: 20px; border-radius: 10px; }
        .pallet-card.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .badge { background: #ffc107; padding: 4px 10px; border-radius: 10px; font-size: 0.8em; font-weight: bold; }
        @media print { .config-grid, .pm-nav, button { display: none !important; } .pallet-card { display: block !important; page-break-after: always; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--primary);">📦 Optimizador de Picking</h1>

    <div class="config-grid">
        <div class="box">
            <strong>1. Maestro de Capacidades:</strong><br><br>
            <input type="file" id="masterFile" accept=".xlsx, .xls">
        </div>
        <div class="box">
            <strong>2. Reporte de Surtido JDE:</strong><br><br>
            <input type="file" id="surtidoFile" accept=".xlsx, .xls">
            <button class="btn-gen" onclick="ejecutar()">🚀 GENERAR PALLETS</button>
        </div>
    </div>

    <div id="resArea" style="display:none;">
        <div id="tabs" class="pm-nav"></div>
        <div id="pallets"></div>
        <button onclick="window.print()" style="width:100%; padding:15px; margin-top:20px; cursor:pointer; background:#333; color:white; border-radius:8px;">🖨️ IMPRIMIR TODO</button>
    </div>
</div>

<script>
    let maestroData = JSON.parse(localStorage.getItem('m_v11_1')) || {};

    // --- CARGA DE MAESTRO (BASADO EN image_e2b62c.png) ---
    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            maestroData = {};
            rows.forEach((row, i) => {
                if(i === 0) return;
                let sku = (row[1] || "").toString().trim(); // Col B (index 1)
                if(sku) {
                    maestroData[sku] = {
                        base: parseFloat(row[5]) || 1,    // Col F (index 5)
                        camada: parseFloat(row[6]) || 1,  // Col G (index 6)
                        familia: (row[8] || "9").toString().trim() // Col I (index 8)
                    };
                }
            });
            localStorage.setItem('m_v11_1', JSON.stringify(maestroData));
            alert("Maestro cargado correctamente.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function ejecutar() {
        const file = document.getElementById('surtidoFile').files[0];
        if(!file) return alert("Seleccioná el archivo de surtido.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, defval: ""});

            // --- BUSCAR SECCIÓN "PALLET MIXTO" ---
            let startIndex = -1;
            for(let i=0; i < rows.length; i++) {
                let txt = rows[i].join(" ").toUpperCase();
                if(txt.includes("PALLET MIXTO") || txt.includes("SURTIDO PM")) { 
                    startIndex = i;
                    break;
                }
            }

            if(startIndex === -1) return alert("No se encontró la sección de Pallets Mixtos en el reporte.");

            let items = [];
            // Empezamos a leer desde donde encontramos el encabezado
            for(let j = startIndex; j < rows.length; j++) {
                let r = rows[j];
                let sku = (r[1] || "").toString().trim(); // Col B (index 1)
                // AJUSTE: Cantidad está en Col I (index 8) según image_e23a4d.png
                let cantStr = (r[8] || "").toString().replace(/[^\d]/g, "");
                let cant = parseInt(cantStr);
                
                if(sku && !isNaN(sku) && sku.length > 2 && !isNaN(cant) && cant > 0) {
                    items.push({
                        ubi: (r[0] || "").toString().trim(),  // Col A (index 0)
                        sku: sku,
                        desc: (r[4] || "").toString().trim(), // Col E (index 4)
                        cant: cant
                    });
                }
            }

            if(items.length === 0) return alert("No se encontraron productos válidos en la sección 'Pallet Mixto'.");
            procesarAgrupado(items);
        };
        reader.readAsArrayBuffer(file);
    }

    function procesarAgrupado(items) {
        // Ordenar por Ubicación (Picking Path)
        items.sort((a, b) => a.ubi.localeCompare(b.ubi));

        const pallets = [];
        let current = null;

        items.forEach(it => {
            let m = maestroData[it.sku];
            let fam = m ? m.familia : "9";
            // CORRECCIÓN: Capacidad = Base * Camada
            let cap = m ? Math.floor(m.base * m.camada) : 140; 

            // Especial Antares (image_e23a4d.png / image_e23e8b.png)
            if(it.desc.toUpperCase().includes("ANTARES")) {
                fam = "ANTARES";
                cap = 450; 
            }

            // Identificar Depósito
            let dep = (it.ubi.includes("P0.14") || it.ubi.includes("P014")) ? "Dep. 2" : "Dep. 1";

            // Regla de agrupamiento: mismo Dep, misma Familia y que quepa en el pallet
            if(!current || current.dep !== dep || current.fam !== fam || (current.total + it.cant) > current.cap) {
                if(current) pallets.push(current);
                current = { 
                    id: pallets.length + 1, 
                    dep: dep, 
                    fam: fam, 
                    cap: cap, 
                    total: 0, 
                    items: [] 
                };
            }
            current.items.push(it);
            current.total += it.cant;
        });

        if(current) pallets.push(current);
        render(pallets);
    }

    function render(pallets) {
        document.getElementById('resArea').style.display = "block";
        const tabs = document.getElementById('tabs');
        const cont = document.getElementById('pallets');
        tabs.innerHTML = ""; cont.innerHTML = "";

        pallets.forEach((p, idx) => {
            const btn = document.createElement('div');
            btn.className = `pm-tab ${idx === 0 ? 'active' : ''}`;
            btn.innerText = `PM ${p.id}`;
            btn.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('p-' + p.id).classList.add('active');
            };
            tabs.appendChild(btn);

            const card = document.createElement('div');
            card.id = 'p-' + p.id;
            card.className = `pallet-card ${idx === 0 ? 'active' : ''}`;
            let ocupacion = Math.round((p.total / p.cap) * 100);
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>Pallet Mixto #${p.id} <span style="font-size:0.6em; color:#666;">(${p.dep})</span></h2>
                    <span class="badge">FAMILIA: ${p.fam}</span>
                </div>
                <p><strong>Total: ${p.total} CA</strong> <small>(Capacidad: ${p.cap} | Ocupación: ${ocupacion}%)</small></p>
                <table>
                    <thead><tr><th>Ubicación</th><th>SKU</th><th>Descripción</th><th>Cant</th></tr></thead>
                    <tbody>${p.items.map(i => `<tr><td><b>${i.ubi}</b></td><td>${i.sku}</td><td>${i.desc}</td><td>${i.cant} CA</td></tr>`).join('')}</tbody>
                </table>
            `;
            cont.appendChild(card);
        });
    }
</script>
</body>
</html>
