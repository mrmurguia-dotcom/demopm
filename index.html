<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Optimizador de Picking v9.5 - Multi-Familia</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0056b3; --secondary: #f8f9fa; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        .step-box { border: 1px solid #dee2e6; padding: 20px; border-radius: 8px; background: var(--secondary); margin-bottom: 20px; }
        .btn-generate { background-color: var(--success); color: white; width: 100%; border: none; padding: 15px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 1.1em; }
        .pm-nav { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .pm-tab { background-color: #e2e6ea; padding: 10px 15px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
        .pm-tab.active { background-color: var(--primary); color: white; }
        .pallet-card { display: none; border: 2px solid #e9ecef; padding: 25px; border-radius: 8px; margin-top: 20px; background: white; }
        .pallet-card.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background: #f4f6f9; }
        .badge { background: #ffc107; padding: 5px 12px; border-radius: 20px; font-size: 0.85em; font-weight: bold; }
        @media print { .step-box, .pm-nav, h1, hr, .btn-generate { display: none !important; } .pallet-card { display: block !important; page-break-after: always; border: 1px solid #000; margin-bottom: 20px; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Optimizador de Picking Multi-Familia</h1>

    <div class="step-box">
        <strong>⚙️ 1. Configuración de Capacidades (Maestro):</strong><br><br>
        <input type="file" id="masterFile" accept=".xlsx, .xls">
        <p style="font-size: 0.8em; color: #666;">Sube un Excel con columnas: SKU, Familia, Base, Camada.</p>
    </div>

    <div class="step-box">
        <strong>🚚 2. Reporte de Surtido JDE:</strong><br><br>
        <input type="file" id="surtidoFile" accept=".xlsx, .xls">
        <button class="btn-generate" style="margin-top:15px;" onclick="generarPallets()">🚀 GENERAR PALLETS OPTIMIZADOS</button>
    </div>

    <div id="resultadosArea" style="display: none;">
        <div id="tabsContainer" class="pm-nav"></div>
        <div id="palletsContainer"></div>
        <button onclick="window.print()" style="width:100%; margin-top:25px; background:#343a40; color:white; padding:15px; border-radius: 8px; cursor: pointer;">🖨️ IMPRIMIR HOJAS DE PICKING</button>
    </div>
</div>

<script>
    // --- REGLAS HARDCODEADAS POR SI NO HAY MAESTRO ---
    // Aquí puedes agregar más palabras clave y sus capacidades (Base * Camada)
    const REGLAS_POR_DEFECTO = [
        { key: "ANTARES", familia: "ANTARES", capacidad: 450 },
        { key: "ALMA MORA", familia: "ALMA MORA", capacidad: 140 },
        { key: "DADA", familia: "DADA", capacidad: 140 },
        { key: "LAS MORAS", familia: "FINCA LAS MORAS", capacidad: 160 },
        { key: "WHITE HORSE", familia: "WHISKY", capacidad: 60 }
    ];

    let maestro = JSON.parse(localStorage.getItem('maestroConfig')) || {};

    document.getElementById('masterFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            maestro = {};
            data.forEach(item => {
                let sku = (item.SKU || item.Artículo || item.Articulo || "").toString().trim();
                if(sku) maestro[sku] = item;
            });
            localStorage.setItem('maestroConfig', JSON.stringify(maestro));
            alert("Maestro cargado con éxito.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function limpiarValor(val) {
        return val ? val.toString().trim() : "";
    }

    function generarPallets() {
        const file = document.getElementById('surtidoFile').files[0];
        if (!file) return alert("Selecciona el archivo de surtido.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, {header: 1, raw: false, defval: ""});

            // Localizar sección Mixtos
            let startIndex = rows.findIndex(r => r.join(" ").toUpperCase().includes("PM PALLET MIXTO"));
            if(startIndex === -1) return alert("No se encontró sección 'PM Pallet Mixto'");

            let pmRows = rows.slice(startIndex);
            let col = { ubi: 0, art: 1, desc: 4, cant: 9 }; // Fallback

            // Detección dinámica de columnas
            for(let i=0; i<20; i++){
                let r = pmRows[i].map(c => c.toString().toUpperCase());
                if(r.includes("UBICACIÓN") || r.includes("ARTÍCULO")){
                    col.ubi = r.indexOf("UBICACIÓN");
                    col.art = r.findIndex(c => c.includes("ARTÍCULO") || c === "ARTICULO");
                    col.desc = r.findIndex(c => c.includes("DESCRIPCIÓN") || c === "DESCRIPCION");
                    col.cant = r.findIndex(c => c.includes("CANTIDA") || c === "CANT");
                    break;
                }
            }

            let itemsFinal = [];
            pmRows.forEach(row => {
                let sku = limpiarValor(row[col.art]);
                let cant = parseInt(limpiarValor(row[col.cant]).replace(/[^\d]/g, ""));
                if(sku && !isNaN(sku) && sku.length > 2 && cant > 0) {
                    itemsFinal.push({
                        ubicacion: limpiarValor(row[col.ubi]),
                        sku: sku,
                        descripcion: limpiarValor(row[col.desc]),
                        cantidad: cant
                    });
                }
            });

            procesarLogicaPallets(itemsFinal);
        };
        reader.readAsArrayBuffer(file);
    }

    function procesarLogicaPallets(items) {
        const pallets = [];
        let current = null;

        // Orden de Picking
        items.sort((a, b) => a.ubicacion.localeCompare(b.ubicacion));

        items.forEach(item => {
            let skuStr = item.sku.toString();
            let descUp = item.descripcion.toUpperCase();
            
            // --- LÓGICA DE CAPACIDAD JERÁRQUICA ---
            let familia = "GENERAL";
            let capacidadMax = 120; // Valor de seguridad

            // 1. Intentar por Maestro
            if (maestro[skuStr]) {
                let m = maestro[skuStr];
                familia = m.Familia || "MAESTRO";
                let base = parseInt(m.Base) || 1;
                let camada = parseInt(m.Camada) || 1;
                capacidadMax = base * camada;
            } 
            // 2. Si no está en maestro, intentar por Reglas de Texto (REGLAS_POR_DEFECTO)
            else {
                let reglaMatch = REGLAS_POR_DEFECTO.find(r => descUp.includes(r.key));
                if (reglaMatch) {
                    familia = reglaMatch.familia;
                    capacidadMax = reglaMatch.capacidad;
                }
            }

            let dep = item.ubicacion.startsWith("P014") ? "Dep. 3" : "Dep. 2";

            // Control de corte
            if (!current || current.dep !== dep || current.familia !== familia || (current.total + item.cantidad) > capacidadMax) {
                if (current) pallets.push(current);
                current = { id: pallets.length + 1, dep, familia, capacidadMax, items: [], total: 0 };
            }
            
            current.items.push(item);
            current.total += item.cantidad;
        });

        if (current) pallets.push(current);
        renderVisual(pallets);
    }

    function renderVisual(pallets) {
        document.getElementById('resultadosArea').style.display = 'block';
        const tCon = document.getElementById('tabsContainer');
        const pCon = document.getElementById('palletsContainer');
        tCon.innerHTML = ""; pCon.innerHTML = "";

        pallets.forEach((p, idx) => {
            const tab = document.createElement('div');
            tab.className = `pm-tab ${idx===0?'active':''}`;
            tab.innerText = `PM ${p.id}`;
            tab.onclick = () => {
                document.querySelectorAll('.pm-tab, .pallet-card').forEach(e => e.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`p-${p.id}`).classList.add('active');
            };
            tCon.appendChild(tab);

            const card = document.createElement('div');
            card.id = `p-${p.id}`;
            card.className = `pallet-card ${idx===0?'active':''}`;
            let ocup = Math.round((p.total / p.capacidadMax) * 100);
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="margin:0;">Pallet #${p.id} <small style="font-size:0.5em; color:#666;">(${p.dep})</small></h2>
                    <span class="badge">FAMILIA: ${p.familia}</span>
                </div>
                <p style="font-size:1.1em; color:var(--primary);"><b>Total: ${p.total} CA</b> (Capacidad: ${p.capacidadMax} | ${ocup}%)</p>
                <table>
                    <thead><tr><th>Ubicación</th><th>SKU</th><th>Descripción</th><th>Cant</th></tr></thead>
                    <tbody>${p.items.map(i => `<tr><td><b>${i.ubicacion}</b></td><td>${i.sku}</td><td>${i.descripcion}</td><td>${i.cantidad} CA</td></tr>`).join('')}</tbody>
                </table>
            `;
            pCon.appendChild(card);
        });
    }
</script>
</body>
</html>
